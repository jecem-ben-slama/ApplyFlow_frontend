name: Frontend CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tracker-frontend:latest
            ghcr.io/${{ github.repository_owner }}/tracker-frontend:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy with specific image
        run: |
          IMG_URL="ghcr.io/${{ github.repository_owner }}/tracker-frontend:${{ github.sha }}"
          ENCODED_IMG_URL=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$IMG_URL")
          curl -f "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK_URL }}&imgURL=$ENCODED_IMG_URL"