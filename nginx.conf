worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging configuration for Render troubleshooting
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip compression for faster loads
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # --- Critical: never cache config.json ---
        # This file is rewritten by entrypoint.sh at container startup with the
        # environment's real apiUrl. If a browser or CDN caches it, dev/prod
        # switching breaks silently.
        location = /assets/config.json {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires -1;
        }

        # --- Static assets: safe to cache aggressively ---
        # Cache static files for 30 days to optimize load speeds
        location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ============================================
        # Reverse proxy to Spring Boot backend
        # Makes frontend + backend same-origin so Brave/Safari
        # don't treat the session cookie as cross-site.
        # ============================================

        # Public DNS resolver — Render doesn't provide Docker's 127.0.0.11,
        # so we use Google/Cloudflare DNS to re-resolve the backend hostname.
        resolver 8.8.8.8 8.8.4.4 valid=30s;
        set $backend "tracker-api-jjme.onrender.com";

        # Regex location matches all Spring Boot API endpoints & OAuth endpoints
        location ~ ^/(api|oauth2|login|logout) {
            proxy_pass https://$backend;
            proxy_ssl_server_name on;
            
            # CRITICAL: Tell Spring Boot it's living on the frontend domain
            proxy_set_header Host $http_host; 
            proxy_set_header X-Forwarded-Host $http_host;
            
            # Pass through real user network information
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Buffering tweaks for handling larger OAuth headers/cookies
            proxy_buffer_size          128k;
            proxy_buffers            4 256k;
            proxy_busy_buffers_size    256k;

            # Rewrite backend cookie domains to match the frontend origin
            proxy_cookie_domain tracker-api-jjme.onrender.com $http_host;
        }

        # --- Angular client-side routing fallback ---
        location / {
            try_files $uri $uri/ /index.html;
        }

        # --- Never cache index.html itself ---
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires -1;
        }

        # Basic security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}