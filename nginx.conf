worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        location = /assets/config.json {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires -1;
        }

        location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # =====================================================================
        # Reverse proxy to Spring Boot backend (Render-Optimized)
        # =====================================================================
        resolver 8.8.8.8 8.8.4.4 valid=30s;
        set $backend "tracker-api-jjme.onrender.com";

        # ─── FIXED REGEX LINE ───
        # Removed "login" so browser visits to /login go to Angular, not Spring Boot
        location ~ ^/(api|oauth2|logout) {
            proxy_pass https://$backend$request_uri;
            proxy_ssl_server_name on;
            
            proxy_set_header Host "tracker-api-jjme.onrender.com"; 
            
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;

            proxy_redirect https://tracker-api-jjme.onrender.com/ /;
            
            proxy_buffer_size          128k;
            proxy_buffers            4 256k;
            proxy_busy_buffers_size    256k;

            proxy_cookie_domain tracker-api-jjme.onrender.com $http_host;
        }

        # --- Angular client-side routing fallback ---
        location / {
            try_files $uri $uri/ /index.html;
        }

        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires -1;
        }

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}