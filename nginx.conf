worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging configuration for troubleshooting
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout  65;

    # Gzip compression for faster loads
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # --- Critical: never cache config.json ---
        # This file is rewritten by entrypoint.sh at container startup
        location = /assets/config.json {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires -1;
        }

        # --- Static assets: safe to cache aggressively ---
        location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # =====================================================================
        # Reverse proxy to Spring Boot backend (Render-Optimized)
        # Makes frontend + backend same-origin to pass Brave/Safari security.
        # =====================================================================

        # Public DNS resolvers to handle dynamic Render upstream resolution
        resolver 8.8.8.8 8.8.4.4 valid=30s;
        set $backend "tracker-api-jjme.onrender.com";

        # ─── INDUSTRY STANDARD OAUTH + API LOCATION MATCH ───
        # This matches API endpoints, core OAuth URLs, and explicitly intercepts 
        # Spring Boot's OAuth callback redirect containing query params matching '/login/oauth2'
        location ~ ^/(api|oauth2|logout|login/oauth2) {
            # 1. Append the request URI explicitly so paths are never lost
            proxy_pass https://$backend$request_uri;
            proxy_ssl_server_name on;
            
            # 2. FIX: Hardcode backend host header so Render routes traffic to the API container
            proxy_set_header Host "tracker-api-jjme.onrender.com"; 
            
            # 3. Tell Spring Boot it's operating on the frontend public domain context
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-Port 443;

            # Intercept redirect headers coming from Spring Boot and map to frontend context
            proxy_redirect https://tracker-api-jjme.onrender.com/ /;
            
            # Buffering tweaks for handling larger OAuth headers/cookies
            proxy_buffer_size          128k;
            proxy_buffers            4 256k;
            proxy_busy_buffers_size    256k;

            # Rewrite backend session cookie domains onto the frontend origin
            proxy_cookie_domain tracker-api-jjme.onrender.com $http_host;
        }

        # --- Angular client-side routing fallback ---
        # Any standard page visit (like /login or /skills) falls through here and routes to Angular
        location / {
            try_files $uri $uri/ /index.html;
        }

        # --- Never cache index.html itself ---
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires -1;
        }

        # Basic security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}