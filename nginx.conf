server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for faster loads
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml;

    # --- Critical: never cache config.json ---
    # This file is rewritten by entrypoint.sh at container startup with the
    # environment's real apiUrl. If a browser or CDN caches it, dev/prod
    # switching breaks silently.
    location = /assets/config.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # --- Static assets: safe to cache aggressively ---
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ============================================
    # Reverse proxy to Spring Boot backend
    # Makes frontend + backend same-origin so Brave/Safari
    # don't treat the session cookie as cross-site.
    # ============================================

    # Docker's embedded DNS resolver — re-resolves backend hostname
    # instead of caching it once at nginx startup.
    resolver 127.0.0.11 valid=30s;
    set $backend "tracker-api-jjme.onrender.com";

    location /api/ {
        proxy_pass https://$backend/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host $backend;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cookie_domain $backend $host;
    }

    location /oauth2/ {
        proxy_pass https://$backend/oauth2/;
        proxy_ssl_server_name on;
        proxy_set_header Host $backend;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cookie_domain $backend $host;
    }

    location /login/ {
        proxy_pass https://$backend/login/;
        proxy_ssl_server_name on;
        proxy_set_header Host $backend;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cookie_domain $backend $host;
    }

    # --- Angular client-side routing fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Never cache index.html itself ---
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}