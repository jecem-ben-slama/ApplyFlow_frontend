server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for faster loads
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml;

    # --- Critical: never cache config.json ---
    # This file is rewritten by entrypoint.sh at container startup with the
    # environment's real apiUrl. If a browser or CDN caches it, dev/prod
    # switching breaks silently.
    location = /assets/config.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # --- Static assets: safe to cache aggressively ---
    # Angular's production build fingerprints filenames (e.g. main.a1b2c3.js),
    # so long cache lifetimes are safe — a new build gets a new filename.
    location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Angular client-side routing fallback ---
    # Any route not matching a real file (e.g. /dashboard, /applications/5)
    # falls back to index.html so Angular's router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Never cache index.html itself ---
    # Otherwise browsers might serve a stale index.html referencing old,
    # since-deleted fingerprinted JS/CSS files after a new deploy.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # Basic security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}