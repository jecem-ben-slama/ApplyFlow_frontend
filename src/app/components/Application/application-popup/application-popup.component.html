<div class="fixed inset-0 bg-gray-900 bg-opacity-50 backdrop-blur-sm flex justify-center items-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-6 space-y-4">
        <h3 class="text-xl font-bold text-gray-900 border-b pb-2">Compile New Targeting Parameters</h3>
        <div *ngIf="errorMessage"
            class="rounded-2xl border border-rose-200 bg-rose-50 text-rose-700 px-4 py-3 text-sm dark:border-rose-500/20 dark:bg-rose-500/10 dark:text-rose-100">
            {{ errorMessage }}
        </div>
        <form (ngSubmit)="onSubmit()" class="space-y-4">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-semibold text-gray-700">Company Destination</label>
                    <input type="text" [(ngModel)]="formModel.companyName" name="companyName" required
                        class="rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
                        placeholder="Google">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-semibold text-gray-700">Target Job Title</label>
                    <input type="text" [(ngModel)]="formModel.jobTitle" name="jobTitle" required
                        class="rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
                        placeholder="Senior Engineer">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-semibold text-gray-700">Recipient Email Address</label>
                    <input type="email" [(ngModel)]="formModel.recipientEmail" name="recipientEmail"
                        class="rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
                        placeholder="hr@company.com">
                </div>
                <div class="flex flex-col gap-1">
                    <label class="text-xs font-semibold text-gray-700">Locale Language</label>
                    <select [(ngModel)]="formModel.language" name="language" required
                        class="rounded-lg border border-gray-300 px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        <option value="en">English (EN)</option>
                        <option value="fr">French (FR)</option>
                    </select>
                </div>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-semibold text-gray-700">Target Layout Template Base</label>
                <select [(ngModel)]="formModel.templateId" name="templateId" (change)="onTemplateChange()"
                    class="rounded-lg border border-gray-300 px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <option [value]="undefined">-- Select Layout Base --</option>
                    <option *ngFor="let t of availableTemplates" [value]="t.id">{{ t.name }} ({{ t.language | uppercase
                        }})</option>
                </select>

                <div *ngIf="selectedTemplatePreview" class="mt-2 p-3 bg-gray-50 border rounded-lg text-xs space-y-2">
                    <p class="font-medium text-gray-600">Template Context Live Compilation Preview:</p>
                    <div
                        class="bg-white border rounded p-2 text-gray-500 font-mono text-[11px] max-h-24 overflow-y-auto whitespace-pre-wrap">
                        {{ getLiveTemplateBodyPreview() }}
                    </div>
                    <div class="flex flex-wrap gap-2 text-[10px]">
                        <span
                            [class]="hasPlaceholder('{{company') ? 'bg-blue-100 text-blue-800' : 'bg-gray-100 text-gray-400'"
                            class="px-2 py-0.5 rounded-full font-medium">
                            {{ formModel.companyName ? '✓' : '⚡' }} Company Tag Detected
                        </span>
                        <span
                            [class]="hasPlaceholder('{{position') || hasPlaceholder('{{role') ? 'bg-blue-100 text-blue-800' : 'bg-gray-100 text-gray-400'"
                            class="px-2 py-0.5 rounded-full font-medium">
                            {{ formModel.jobTitle ? '✓' : '⚡' }} Position Tag Detected
                        </span>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-xs font-semibold text-gray-700">Target CV Attachment Link</label>
                <select [(ngModel)]="formModel.cvVariantId" name="cvVariantId"
                    class="rounded-lg border border-gray-300 px-3 py-2 text-sm bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <option [value]="undefined">-- Select CV Path Profile --</option>
                    <option *ngFor="let cv of availableCvVariants" [value]="cv.id">{{ cv.name }} ({{ cv.language |
                        uppercase }})</option>
                </select>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-xs font-semibold text-gray-700">Keywords Injection (Skills Matrix Array)</label>
                <div
                    class="flex flex-wrap gap-2 max-h-32 overflow-y-auto p-2 bg-gray-50 rounded-lg border border-gray-200">
                    <div *ngFor="let skill of availableSkills" (click)="toggleSkillSelection(skill.id)"
                        [class]="formModel.skillIds.includes(skill.id) ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-100'"
                        class="cursor-pointer text-xs font-medium px-3 py-1 rounded-full border shadow-sm transition">
                        {{ skill.name }}
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-1">
                <label class="text-xs font-semibold text-gray-700">Private Notes Context</label>
                <textarea [(ngModel)]="formModel.notes" name="notes" rows="2"
                    class="rounded-lg border border-gray-300 px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    placeholder="Requirements details..."></textarea>
            </div>

            <div class="flex justify-end gap-3 pt-4 border-t">
                <button type="button"
                    class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-2 px-4 rounded-lg text-sm transition"
                    (click)="closeModal()">Cancel</button>
                <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg text-sm shadow-sm transition disabled:opacity-50"
                    [disabled]="isLoading">Compile & Save</button>
            </div>
        </form>
    </div>
</div>
