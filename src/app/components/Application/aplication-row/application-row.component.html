<td class="px-6 py-4 font-semibold text-gray-900">{{ app.companyName }}</td>
<td class="px-6 py-4 text-gray-600">{{ app.jobTitle }}</td>
<td class="px-6 py-4 text-gray-500">{{ app.dateApplied | date:'mediumDate' }}</td>
<td class="px-6 py-4">
  <span
    class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-purple-100 text-purple-800 uppercase">
    {{ app.language }}
  </span>
</td>
<td class="px-6 py-4">
  <select [ngModel]="app.status" (ngModelChange)="statusChange.emit({ id: app.id, status: $event })"
    class="rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm py-1 px-2 bg-gray-50 border">
    <option value="COMPILED">Compiled</option>
    <option value="SENT">Sent</option>
    <option value="INTERVIEWING">Interviewing</option>
    <option value="REJECTED">Rejected</option>
  </select>
</td>
<td class="px-6 py-4 space-x-2">
  <button (click)="togglePanel.emit(app.id)"
    [class]="isExpanded
      ? 'text-blue-700 bg-blue-100 hover:bg-blue-200 font-medium text-xs px-2.5 py-1.5 rounded-md transition'
      : 'text-blue-600 hover:text-blue-900 font-medium text-xs bg-blue-50 hover:bg-blue-100 px-2.5 py-1.5 rounded-md transition'">
    {{ isExpanded ? '▲ Hide Email' : '▼ View Email' }}
  </button>
  <button
    class="text-red-600 hover:text-red-900 font-medium text-xs bg-red-50 hover:bg-red-100 px-2.5 py-1.5 rounded-md transition"
    (click)="deleteApp.emit(app.id)">
    Delete
  </button>
</td>
