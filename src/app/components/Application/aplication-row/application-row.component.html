<td class="px-3 sm:px-6 py-4 flex flex-col md:table-cell">
  <span class="font-semibold text-gray-900 dark:text-slate-100 text-sm md:text-base leading-tight">{{ app.companyName
    }}</span>
  <span class="text-gray-500 dark:text-slate-400 text-xs md:hidden mt-0.5">{{ app.jobTitle }}</span>
</td>
<td class="hidden md:table-cell px-6 py-4 text-gray-600 dark:text-slate-400">
  {{ app.jobTitle }}
</td>

<td class="px-3 sm:px-6 py-4 text-gray-500 dark:text-slate-400 text-[11px] sm:text-sm whitespace-nowrap">
  <span class="hidden md:inline">{{ app.dateApplied | date:'mediumDate' }}</span>
  <span class="md:hidden" [title]="app.dateApplied | date:'mediumDate'">
    {{ app.dateApplied | date:'shortDate' }}
  </span>
</td>

<td class="px-3 sm:px-6 py-4">
  <span
    class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] sm:text-xs font-medium bg-purple-100 dark:bg-purple-950/50 text-purple-800 dark:text-purple-300 uppercase tracking-wider">
    {{ app.language }}
  </span>
</td>

<td class="px-3 sm:px-6 py-4">
  <select [ngModel]="app.status" (ngModelChange)="statusChange.emit({ id: app.id, status: $event })"
    class="w-full max-w-[130px] rounded-md shadow-sm focus:border-blue-500 focus:ring-blue-500 text-[11px] sm:text-sm py-1.5 px-2 bg-gray-50 dark:bg-slate-800 border border-gray-300 dark:border-slate-600 text-gray-900 dark:text-slate-100">
    <option value="COMPILED">Compiled</option>
    <option value="SENT">Sent</option>
    <option value="INTERVIEWING">Interviewing</option>
    <option value="REJECTED">Rejected</option>
  </select>
</td>

<td class="px-3 sm:px-6 py-4 flex flex-row md:table-cell items-center gap-2 space-x-0 md:space-x-2 whitespace-nowrap">
  <button (click)="togglePanel.emit(app.id)"
    [class]="isExpanded
      ? 'text-blue-700 dark:text-blue-300 bg-blue-100 dark:bg-blue-950/50 hover:bg-blue-200 dark:hover:bg-blue-950 font-medium text-[11px] sm:text-xs px-2.5 py-1.5 rounded-md transition'
      : 'text-blue-600 dark:text-blue-400 hover:text-blue-900 dark:hover:text-blue-200 font-medium text-[11px] sm:text-xs bg-blue-50 dark:bg-blue-950/30 hover:bg-blue-100 dark:hover:bg-blue-950/60 px-2.5 py-1.5 rounded-md transition'">
    {{ isExpanded ? '▲ Hide' : '▼ Email' }}
  </button>
  <button
    class="text-red-600 dark:text-red-400 hover:text-red-900 dark:hover:text-red-200 font-medium text-[11px] sm:text-xs bg-red-50 dark:bg-red-950/40 hover:bg-red-100 dark:hover:bg-red-950 px-2.5 py-1.5 rounded-md transition"
    (click)="deleteApp.emit(app.id)">
    Delete
  </button>
</td>
