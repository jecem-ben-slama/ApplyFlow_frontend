<td class="px-3 sm:px-6 py-4 flex flex-col md:table-cell">
  <span class="font-semibold text-gray-900 text-sm md:text-base leading-tight">{{ app.companyName }}</span>
  <span class="text-gray-500 text-xs md:hidden mt-0.5">{{ app.jobTitle }}</span>
</td>
<td class="hidden md:table-cell px-6 py-4 text-gray-600">
  {{ app.jobTitle }}
</td>

<td class="px-3 sm:px-6 py-4 text-gray-500 text-[11px] sm:text-sm whitespace-nowrap">
  <span class="hidden md:inline">{{ app.dateApplied | date:'mediumDate' }}</span>
  <span class="md:hidden" [title]="app.dateApplied | date:'mediumDate'">
    {{ app.dateApplied | date:'shortDate' }}
  </span>
</td>

<td class="px-3 sm:px-6 py-4">
  <span
    class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] sm:text-xs font-medium bg-purple-100 text-purple-800 uppercase tracking-wider">
    {{ app.language }}
  </span>
</td>

<td class="px-3 sm:px-6 py-4">
  <select [ngModel]="app.status" (ngModelChange)="statusChange.emit({ id: app.id, status: $event })"
    class="w-full max-w-[130px] rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-[11px] sm:text-sm py-1.5 px-2 bg-gray-50 border">
    <option value="COMPILED">Compiled</option>
    <option value="SENT">Sent</option>
    <option value="INTERVIEWING">Interviewing</option>
    <option value="REJECTED">Rejected</option>
  </select>
</td>

<td class="px-3 sm:px-6 py-4 flex flex-row md:table-cell items-center gap-2 space-x-0 md:space-x-2 whitespace-nowrap">
  <button (click)="togglePanel.emit(app.id)"
    [class]="isExpanded
      ? 'text-blue-700 bg-blue-100 hover:bg-blue-200 font-medium text-[11px] sm:text-xs px-2.5 py-1.5 rounded-md transition'
      : 'text-blue-600 hover:text-blue-900 font-medium text-[11px] sm:text-xs bg-blue-50 hover:bg-blue-100 px-2.5 py-1.5 rounded-md transition'">
    {{ isExpanded ? '▲ Hide' : '▼ Email' }}
  </button>
  <button
    class="text-red-600 hover:text-red-900 font-medium text-[11px] sm:text-xs bg-red-50 hover:bg-red-100 px-2.5 py-1.5 rounded-md transition"
    (click)="deleteApp.emit(app.id)">
    Delete
  </button>
</td>
