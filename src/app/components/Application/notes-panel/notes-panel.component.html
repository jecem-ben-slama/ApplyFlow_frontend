<div class="border-l border-gray-200 flex flex-col px-4 py-4 gap-3">
  <div class="flex items-center justify-between">
    <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Notes</p>
    <button
      *ngIf="!isEditing"
      class="text-xs text-blue-600 hover:text-blue-800 font-medium px-2 py-1 rounded hover:bg-blue-50 transition"
      (click)="startEdit()">
      Edit
    </button>
  </div>

  <ng-container *ngIf="!isEditing">
    <p *ngIf="app.notes; else noNotes"
      class="text-sm text-gray-700 leading-relaxed whitespace-pre-wrap bg-gray-50 rounded-lg p-3 flex-1">
      {{ app.notes }}
    </p>
    <ng-template #noNotes>
      <p class="text-sm text-gray-400 italic bg-gray-50 rounded-lg p-3 flex-1">No notes yet.</p>
    </ng-template>
    <p *ngIf="savedFlash"
      class="text-xs text-emerald-600 font-medium flex items-center gap-1 animate-pulse">
      ✓ Saved
    </p>
  </ng-container>

  <ng-container *ngIf="isEditing">
    <textarea
      [(ngModel)]="editValue"
      rows="6"
      class="w-full rounded-lg border border-blue-400 px-3 py-2 text-sm text-gray-800 focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none leading-relaxed"
      placeholder="Add your notes here...">
    </textarea>
    <div class="flex gap-2 justify-end">
      <button
        class="text-xs text-gray-600 hover:text-gray-800 font-medium px-3 py-1.5 rounded-md border border-gray-300 hover:bg-gray-50 transition"
        (click)="cancelEdit()">
        Cancel
      </button>
      <button
        class="text-xs text-white font-medium px-3 py-1.5 rounded-md bg-emerald-600 hover:bg-emerald-700 transition"
        (click)="save()">
        Save
      </button>
    </div>
  </ng-container>
</div>
