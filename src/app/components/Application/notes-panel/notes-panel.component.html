<div class="border-l border-gray-200 dark:border-slate-700 flex flex-col px-3 sm:px-4 py-4 gap-3">

  <div class="flex items-center justify-between">
    <p class="text-xs font-semibold text-gray-500 dark:text-slate-400 uppercase tracking-wide">Notes</p>
    <button *ngIf="!isEditing"
      class="text-xs text-blue-600 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-200 font-medium px-2.5 py-1.5 rounded-lg hover:bg-blue-50 dark:hover:bg-blue-950/40 transition active:scale-95"
      (click)="startEdit()">
      Edit
    </button>
  </div>

  <ng-container *ngIf="!isEditing">
    <p *ngIf="app.notes; else noNotes"
      class="text-xs sm:text-sm text-gray-700 dark:text-slate-300 leading-relaxed whitespace-pre-wrap bg-gray-50 dark:bg-slate-800/60 rounded-lg p-3.5 sm:p-3 flex-1 break-words">
      {{ app.notes }}
    </p>
    <ng-template #noNotes>
      <p
        class="text-xs sm:text-sm text-gray-400 dark:text-slate-500 italic bg-gray-50 dark:bg-slate-800/60 rounded-lg p-3.5 sm:p-3 flex-1">
        No notes yet.</p>
    </ng-template>
    <p *ngIf="savedFlash"
      class="text-[11px] text-emerald-600 dark:text-emerald-400 font-medium flex items-center gap-1 animate-pulse">
      ✓ Saved
    </p>
  </ng-container>

  <ng-container *ngIf="isEditing">
    <textarea [(ngModel)]="editValue" rows="5"
      class="w-full rounded-lg border border-blue-400 dark:border-blue-500 px-3 py-2.5 text-xs sm:text-sm text-gray-800 dark:text-slate-100 focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none leading-relaxed bg-white dark:bg-slate-900 dark:placeholder-slate-500"
      placeholder="Add your notes here...">
    </textarea>

    <div class="flex gap-2 justify-end sm:justify-end mt-1">
      <button
        class="flex-1 sm:flex-none text-xs text-gray-600 dark:text-slate-300 hover:text-gray-800 dark:hover:text-slate-100 font-medium px-4 py-2 rounded-lg border border-gray-300 dark:border-slate-600 hover:bg-gray-50 dark:hover:bg-slate-800 transition active:scale-95"
        (click)="cancelEdit()">
        Cancel
      </button>
      <button
        class="flex-1 sm:flex-none text-xs text-white font-medium px-4 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-700 dark:bg-emerald-700 dark:hover:bg-emerald-600 transition active:scale-95 shadow-sm"
        (click)="save()">
        Save
      </button>
    </div>
  </ng-container>
</div>
