<div
  class="mt-3 rounded-xl border border-gray-200 bg-white shadow-sm overflow-hidden flex flex-col md:grid md:grid-cols-[1fr_280px]">

  <div class="flex flex-col border-b md:border-b-0 md:border-r border-gray-200">
    <div class="bg-gray-50 border-b border-gray-200 px-4 sm:px-5 py-4 space-y-2">
      <p class="text-sm sm:text-base font-semibold text-gray-900 leading-snug">{{ app.generatedSubject }}</p>
      <div class="flex items-center gap-2 text-xs sm:text-sm text-gray-500 overflow-hidden">
        <span
          class="inline-flex items-center justify-center w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-blue-600 text-white text-[10px] sm:text-xs font-semibold shrink-0">
          {{ (app.companyName || 'AA').slice(0, 2).toUpperCase() }}
        </span>
        <span class="truncate">
          <span class="font-medium text-gray-800">{{ app.companyName || 'Company' }}</span>
          &lt;{{ app.recipientEmail || 'N/A' }}&gt;
        </span>
      </div>
    </div>

    <div
      class="px-4 sm:px-5 py-4 text-xs sm:text-sm text-gray-800 whitespace-pre-wrap leading-relaxed flex-1 overflow-y-auto max-h-[350px] md:max-h-none">
      {{ app.generatedBody }}
    </div>

    <div class="border-t border-gray-100 px-4 sm:px-5 py-3 flex gap-2 flex-wrap">
      <button
        class="flex-1 sm:flex-none justify-center text-blue-600 hover:text-blue-900 font-medium text-[11px] sm:text-xs bg-blue-50 hover:bg-blue-100 px-3 py-2 rounded-md transition flex items-center gap-1.5 disabled:opacity-50"
        [disabled]="isSending || !app.recipientEmail" (click)="sendEmail.emit(app)">
        <span *ngIf="isSending"
          class="inline-block animate-spin rounded-full h-3 w-3 border-2 border-blue-600 border-t-transparent"></span>
        {{ isSending ? 'Dispatching...' : '🚀 Send Now' }}
      </button>
      <button
        class="flex-1 sm:flex-none justify-center text-gray-600 hover:text-gray-900 font-medium text-[11px] sm:text-xs bg-gray-100 hover:bg-gray-200 px-3 py-2 rounded-md transition"
        (click)="copyBody.emit(app.generatedBody)">
        📋 Copy Body
      </button>
    </div>
  </div>

  <div class="bg-gray-50/50 md:bg-transparent">
    <app-notes-panel [app]="app" (notesSaved)="notesSaved.emit($event)">
    </app-notes-panel>
  </div>

</div>
