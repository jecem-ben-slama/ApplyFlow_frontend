<div class="mt-3 rounded-xl border border-gray-200 bg-white shadow-sm overflow-hidden grid grid-cols-[1fr_280px]">

  <!-- Email viewer -->
  <div class="flex flex-col">
    <div class="bg-gray-50 border-b border-gray-200 px-5 py-4 space-y-2">
      <p class="text-base font-semibold text-gray-900">{{ app.generatedSubject }}</p>
      <div class="flex items-center gap-2 text-sm text-gray-500">
        <span class="inline-flex items-center justify-center w-8 h-8 rounded-full bg-blue-600 text-white text-xs font-semibold shrink-0">
          {{ app.companyName.slice(0, 2).toUpperCase() }}
        </span>
        <span>
          <span class="font-medium text-gray-800">{{ app.companyName }}</span>
          &lt;{{ app.recipientEmail || 'N/A' }}&gt;
        </span>
      </div>
    </div>

    <div class="px-5 py-4 text-sm text-gray-800 whitespace-pre-wrap leading-relaxed flex-1">
      {{ app.generatedBody }}
    </div>

    <div class="border-t border-gray-100 px-5 py-3 flex gap-2">
      <button
        class="text-blue-600 hover:text-blue-900 font-medium text-xs bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-md transition flex items-center gap-1 disabled:opacity-50"
        [disabled]="isSending || !app.recipientEmail"
        (click)="sendEmail.emit(app)">
        <span *ngIf="isSending" class="inline-block animate-spin rounded-full h-3 w-3 border-2 border-blue-600 border-t-transparent"></span>
        {{ isSending ? 'Dispatching...' : '🚀 Send Now' }}
      </button>
      <button
        class="text-gray-600 hover:text-gray-900 font-medium text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-md transition"
        (click)="copyBody.emit(app.generatedBody)">
        Copy
      </button>
    </div>
  </div>

  <!-- Notes sidebar -->
  <app-notes-panel
    [app]="app"
    (notesSaved)="notesSaved.emit($event)">
  </app-notes-panel>

</div>
