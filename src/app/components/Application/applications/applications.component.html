<div class="p-6 max-w-7xl mx-auto space-y-6">
    <div class="flex justify-between items-center border-b border-gray-200 pb-4">
        <h2 class="text-2xl font-bold text-gray-900 tracking-tight">Applications Pipeline Engine</h2>
        <button
            class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg shadow-sm transition duration-150 ease-in-out"
            (click)="openCreateModal()">
            + Compile New Application
        </button>
    </div>

    <!-- Search & Filter Bar -->
    <div class="flex flex-wrap gap-3 items-end bg-gray-50 border border-gray-200 rounded-xl px-4 py-3">
        <div class="flex flex-col gap-1 flex-1 min-w-[180px]">
            <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Keyword</label>
            <input type="text" [(ngModel)]="filterKeyword" placeholder="Search company or job title..."
                (keyup.enter)="onSearch()"
                class="rounded-md border border-gray-300 shadow-sm px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white" />
        </div>
        <div class="flex flex-col gap-1 min-w-[150px]">
            <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">Status</label>
            <select [(ngModel)]="filterStatus"
                class="rounded-md border border-gray-300 shadow-sm px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                <option value="">All Statuses</option>
                <option value="COMPILED">Compiled</option>
                <option value="SENT">Sent</option>
                <option value="INTERVIEWING">Interviewing</option>
                <option value="REJECTED">Rejected</option>
            </select>
        </div>
        <div class="flex gap-2">
            <button (click)="onSearch()"
                class="bg-blue-600 hover:bg-blue-700 text-white font-medium text-sm px-4 py-1.5 rounded-md shadow-sm transition">
                Search
            </button>
            <button (click)="onClearFilters()"
                class="bg-white hover:bg-gray-100 text-gray-600 font-medium text-sm px-4 py-1.5 rounded-md border border-gray-300 transition">
                Clear
            </button>
        </div>
    </div>

    <!-- Feedback banners -->
    <div *ngIf="errorMessage" class="bg-red-50 border-l-4 border-red-500 p-4 text-red-800 rounded shadow-sm">
        {{ errorMessage }}
    </div>
    <div *ngIf="successMessage"
        class="bg-emerald-50 border-l-4 border-emerald-500 p-4 text-emerald-800 rounded shadow-sm">
        {{ successMessage }}
    </div>

    <div *ngIf="isLoading" class="text-center py-8 text-gray-500 animate-pulse font-medium">
        Querying pipeline data layers...
    </div>

    <!-- Table -->
    <div *ngIf="!isLoading && appPage?.content?.length"
        class="overflow-x-auto bg-white rounded-xl shadow border border-gray-200">
        <table class="min-w-full text-left text-sm">
            <thead class="bg-gray-50 text-xs font-semibold text-gray-700 uppercase tracking-wider">
                <tr>
                    <th class="px-6 py-4">Company</th>
                    <th class="px-6 py-4">Job Title</th>
                    <th class="px-6 py-4">Date Applied</th>
                    <th class="px-6 py-4">Language</th>
                    <th class="px-6 py-4">Status</th>
                    <th class="px-6 py-4">Actions</th>
                </tr>
            </thead>
            <tbody class="text-gray-900 bg-white">
                <ng-container *ngFor="let app of appPage!.content">

                    <!-- Data row -->
                    <tr app-application-row class="hover:bg-gray-50 transition border-t border-gray-100" [app]="app"
                        [isExpanded]="expandedAppId === app.id" [isSendingEmail]="isSendingEmail"
                        (togglePanel)="onTogglePanel($event)" (statusChange)="onUpdateStatus($event.id, $event.status)"
                        (deleteApp)="onDelete($event)" (sendEmail)="onSendEmail($event)" (copyBody)="onCopyBody($event)"
                        (notesSaved)="onSaveNotes($event.appId, $event.notes)">
                    </tr>

                    <!-- Expanded email/notes panel row -->
                    <tr *ngIf="expandedAppId === app.id" class="bg-gray-50">
                        <td colspan="6" class="px-4 pb-4 pt-0">
                            <app-email-panel [app]="app" [isSending]="isSendingEmail" (sendEmail)="onSendEmail($event)"
                                (copyBody)="onCopyBody($event)" (notesSaved)="onSaveNotes($event.appId, $event.notes)">
                            </app-email-panel>
                        </td>
                    </tr>

                </ng-container>
            </tbody>
        </table>
    </div>

    <!-- Empty state -->
    <div *ngIf="!isLoading && !appPage?.content?.length"
        class="text-center py-16 bg-gray-50 rounded-xl border border-dashed border-gray-300 text-gray-500">
        <p class="font-medium text-base">No tracking records populated.</p>
        <p class="text-sm text-gray-400 mt-1">Click create to trigger the configuration wizard.</p>
    </div>

    <app-pagination [currentPage]="currentPage" [totalPages]="appTotalPages" [loading]="isLoading"
        (pageChange)="onPageChange($event)">
    </app-pagination>

    <app-delete-popup [isModalOpen]="showDeleteModal" [title]="'Confirm Deletion'" [message]="deleteMessage"
        (confirm)="onConfirmDelete()" (close)="onCancelDelete()" [isLoading]="isLoading">
    </app-delete-popup>

    <app-application-popup *ngIf="isModalOpen" [availableSkills]="availableSkills"
        [availableCvVariants]="availableCvVariants" [availableTemplates]="availableTemplates" [isLoading]="isLoading"
        (close)="closeModal()" (submit)="onCreateSubmit($event)">
    </app-application-popup>
</div>
