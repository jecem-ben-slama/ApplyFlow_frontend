<div *ngIf="isModalOpen"
    class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/70 backdrop-blur-md transition-all duration-300">
    <div
        class="w-full max-w-lg rounded-[2rem] border border-slate-200/60 dark:border-slate-800/80 bg-white dark:bg-slate-900 p-6 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.3)] dark:shadow-slate-950/50 relative overflow-hidden">

        <div class="absolute top-0 left-0 right-0 h-2 bg-gradient-to-r from-indigo-500 via-violet-500 to-indigo-500">
        </div>

        <div class="flex items-start justify-between gap-4 mb-4">
            <div>
                <h2 class="text-lg font-bold tracking-tight text-slate-900 dark:text-slate-50">{{ title }}</h2>
                <p class="text-slate-500 dark:text-slate-400 text-xs mt-1.5">{{ message }}</p>
            </div>
            <button type="button" (click)="onCancel()"
                class="rounded-2xl p-2.5 text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-600 dark:hover:text-slate-200 transition-all">
                <mat-icon class="block">close</mat-icon>
            </button>
        </div>

        <div class="flex items-center justify-end gap-3 pt-4 border-t border-slate-100 dark:border-slate-800/60 mt-6">
            <button type="button" (click)="onCancel()"
                class="w-full sm:w-auto rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 py-3 text-sm font-semibold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800/60 transition-all shadow-sm">
                {{ cancelLabel }}
            </button>
            <button type="button" (click)="onConfirm()" [disabled]="isLoading"
                class="w-full sm:w-auto rounded-2xl bg-rose-600 hover:bg-rose-500 disabled:bg-rose-400 px-6 py-3 text-sm font-semibold text-white transition-all shadow-lg shadow-rose-500/20 active:scale-[0.98]">
                <span *ngIf="isLoading" class="flex items-center justify-center gap-2">
                    <svg class="animate-spin h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    Processing...
                </span>
                <span *ngIf="!isLoading">{{ confirmLabel }}</span>
            </button>
        </div>
    </div>
</div>
