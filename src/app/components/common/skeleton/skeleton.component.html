<div class="w-full animate-pulse space-y-4">

    <ng-container *ngIf="type === 'table'">
        <div class="h-10 w-full rounded bg-slate-200 dark:bg-slate-800"></div>

        <div class="space-y-3">
            <div *ngFor="let i of counterArray"
                class="grid grid-cols-5 gap-4 border-b border-slate-100 py-4 dark:border-slate-900">
                <div class="col-span-2 h-5 rounded bg-slate-200 dark:bg-slate-800"></div>
                <div class="col-span-1 h-5 rounded bg-slate-200 dark:bg-slate-800"></div>
                <div class="col-span-1 h-5 rounded bg-slate-200 dark:bg-slate-800"></div>
                <div class="col-span-1 h-5 rounded bg-slate-200 dark:bg-slate-800"></div>
            </div>
        </div>
    </ng-container>

    <ng-container *ngIf="type === 'card'">
        <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
            <div *ngFor="let i of counterArray"
                class="p-6 rounded-xl border border-slate-100 bg-white shadow-sm dark:border-slate-900 dark:bg-slate-900 space-y-3">
                <div class="h-4 w-1/3 rounded bg-slate-200 dark:bg-slate-800"></div>
                <div class="h-8 w-2/3 rounded bg-slate-200 dark:bg-slate-800"></div>
            </div>
        </div>
    </ng-container>

    <ng-container *ngIf="type === 'list'">
        <div class="space-y-3">
            <div *ngFor="let i of counterArray"
                class="flex items-center space-x-4 p-3 rounded-lg bg-slate-50 dark:bg-slate-900">
                <div class="h-10 w-10 rounded-full bg-slate-200 dark:bg-slate-800"></div>
                <div class="flex-1 space-y-2">
                    <div class="h-4 w-1/4 rounded bg-slate-200 dark:bg-slate-800"></div>
                    <div class="h-3 w-1/2 rounded bg-slate-200 dark:bg-slate-800"></div>
                </div>
            </div>
        </div>
    </ng-container>

</div>
