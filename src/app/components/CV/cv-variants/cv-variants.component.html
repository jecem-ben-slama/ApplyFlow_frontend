<div class="p-6 md:p-8 space-y-6 text-slate-900 dark:text-slate-100 max-w-full mx-auto w-full">

    <div class="border-b border-slate-200 dark:border-slate-800 pb-4">
        <h1 class="text-xl md:text-2xl font-bold tracking-tight">Attachment Management</h1>
        <p class="text-slate-500 dark:text-slate-400 text-xs mt-1">
            Manage your different CVs, cover letters, and application profiles in one place.
        </p>
    </div>

    <div class="space-y-6">

        <app-cv-filters-bar [selectedLanguage]="selectedLanguage" [searchQuery]="searchQuery"
            (languageChange)="onLanguageFilterChange($event)" (searchChange)="onSearchChange($event)"
            (clearSearch)="clearSearch()" (addClick)="openCreateModal()">
        </app-cv-filters-bar>

        <app-cv-feedback [error]="errorMessage" [success]="successMessage" />

        <div *ngIf="isLoading"
            class="rounded-3xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 p-6 text-center text-slate-600 dark:text-slate-400">
            Processing data pipelines...
        </div>

        <app-cv-table *ngIf="!isLoading && cvPage?.content?.length" [rows]="cvPage!.content"
            (edit)="openEditModal($event)" (delete)="onDelete($event)">
        </app-cv-table>

        <div *ngIf="!isLoading && !cvPage?.content?.length"
            class="rounded-3xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 p-8 text-center text-slate-500 dark:text-slate-400">
            <ng-container *ngIf="searchQuery; else noData">
                No CV variants matched <span class="font-semibold text-slate-700 dark:text-slate-200">"{{ searchQuery
                    }}"</span>.
                <button (click)="clearSearch()" class="ml-2 text-indigo-500 hover:underline text-sm">Clear
                    search</button>
            </ng-container>
            <ng-template #noData>No tracked CV configurations matched your query parameters.</ng-template>
        </div>

        <app-pagination *ngIf="(cvPage?.totalPages ?? 0) > 1" [currentPage]="currentPage"
            [totalPages]="cvPage?.totalPages ?? 0" [loading]="isLoading" (pageChange)="onPageChange($event)">
        </app-pagination>

    </div>

    <app-delete-popup [isModalOpen]="showDeleteModal" [title]="'Confirm Deletion'" [message]="deleteMessage"
        [isLoading]="isLoading" (confirm)="onConfirmDelete()" (close)="onCancelDelete()">
    </app-delete-popup>

    <app-cv-popup [isModalOpen]="isModalOpen" [isEditing]="isEditing" [formModel]="formModel" [isLoading]="isLoading"
        (close)="closeModal()" (save)="onSubmit()">
    </app-cv-popup>

</div>
