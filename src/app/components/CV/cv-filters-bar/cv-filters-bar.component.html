<div
    class="bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-3xl shadow-sm p-5 md:p-6 flex flex-col gap-4">

    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div class="flex flex-col sm:flex-row sm:items-center gap-3 w-full md:w-auto">
            <label class="text-[10px] uppercase tracking-[0.3em] text-slate-500 dark:text-slate-400 whitespace-nowrap">
                Language
            </label>
            <select [value]="selectedLanguage" (change)="languageChange.emit($any($event.target).value)"
                class="w-full md:w-44 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg px-3 py-2 text-sm text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-colors">
                <option value="">All Languages</option>
                <option value="en">English (EN)</option>
                <option value="fr">French (FR)</option>
            </select>
        </div>

        <button (click)="addClick.emit()"
            class="inline-flex items-center justify-center gap-2 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold px-5 py-2.5 transition-colors shadow-sm shadow-indigo-500/10 whitespace-nowrap">
            <span class="text-base">+</span>
            Add CV Variant
        </button>
    </div>

    <div class="relative">
        <mat-icon
            class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-base pointer-events-none">search</mat-icon>
        <input type="text" [value]="searchQuery" (input)="searchChange.emit($any($event.target).value)"
            placeholder="Search by name, language, or file URL…"
            class="w-full bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl pl-9 pr-9 py-2.5 text-sm text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 transition-colors" />
        <button *ngIf="searchQuery" (click)="clearSearch.emit()"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
            <mat-icon class="text-base">close</mat-icon>
        </button>
    </div>

</div>
