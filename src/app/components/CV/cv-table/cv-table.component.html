<div
    class="overflow-hidden rounded-3xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 shadow-sm">

    <div class="hidden md:block overflow-x-auto">
        <table class="w-full text-left border-collapse min-w-[720px]">
            <thead>
                <tr
                    class="bg-slate-100 dark:bg-slate-900/80 text-slate-500 dark:text-slate-400 text-[10px] uppercase tracking-wider">
                    <th class="py-3 px-4">Name</th>
                    <th class="py-3 px-4 w-28">Language</th>
                    <th class="py-3 px-4">File Destination</th>
                    <th class="py-3 px-4 text-right w-36">Actions</th>
                </tr>
            </thead>
            <tbody class="text-sm divide-y divide-slate-200 dark:divide-slate-800">
                <tr *ngFor="let cv of rows" class="hover:bg-slate-50 dark:hover:bg-slate-900/70 transition-colors">
                    <td class="py-4 px-4 text-slate-900 dark:text-slate-100 font-semibold">{{ cv.name }}</td>
                    <td class="py-4 px-4">
                        <span
                            class="inline-flex items-center rounded-full bg-slate-100 dark:bg-slate-800 px-2.5 py-1 text-[10px] font-semibold uppercase tracking-[0.25em] text-slate-700 dark:text-slate-300">
                            {{ cv.language | uppercase }}
                        </span>
                    </td>
                    <td class="py-4 px-4 text-slate-600 dark:text-slate-400 truncate max-w-xs">
                        <a [href]="cv.fileUrl" target="_blank"
                            class="text-indigo-600 dark:text-indigo-300 hover:underline break-all">
                            {{ cv.fileUrl }}
                        </a>
                    </td>
                    <td class="py-4 px-4 text-right">
                        <button (click)="edit.emit(cv)"
                            class="inline-flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 text-slate-700 dark:text-slate-200 px-3 py-2 text-xs font-semibold hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors mr-2">
                            Edit
                        </button>
                        <button (click)="delete.emit(cv.id)"
                            class="inline-flex items-center justify-center rounded-lg border border-rose-200 bg-rose-50 text-rose-700 px-3 py-2 text-xs font-semibold hover:bg-rose-100 transition-colors dark:border-rose-500/20 dark:bg-rose-500/10 dark:text-rose-100 dark:hover:bg-rose-500/20">
                            Delete
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="block md:hidden divide-y divide-slate-200 dark:divide-slate-800">
        <div *ngFor="let cv of rows"
            class="p-4 space-y-3 hover:bg-slate-50/50 dark:hover:bg-slate-900/40 transition-colors">

            <div class="flex justify-between items-start gap-3">
                <div class="min-w-0 flex-1">
                    <h4 class="font-bold text-slate-900 dark:text-slate-100 text-sm break-words">{{ cv.name }}</h4>
                </div>
                <span
                    class="inline-flex items-center rounded-full bg-slate-100 dark:bg-slate-800 px-2.5 py-0.5 text-[9px] font-semibold uppercase tracking-wider text-slate-700 dark:text-slate-300 shrink-0">
                    {{ cv.language | uppercase }}
                </span>
            </div>

            <div
                class="bg-slate-50 dark:bg-slate-900/40 p-2.5 rounded-xl border border-slate-100 dark:border-slate-800/50 break-all overflow-hidden">
                <span class="block text-[8px] font-bold text-slate-400 uppercase tracking-wider mb-1">File
                    Destination</span>
                <a [href]="cv.fileUrl" target="_blank"
                    class="text-xs text-indigo-600 dark:text-indigo-400 hover:underline break-all line-clamp-2">
                    {{ cv.fileUrl }}
                </a>
            </div>

            <div class="flex gap-2 justify-end pt-1">
                <button (click)="edit.emit(cv)"
                    class="flex-1 sm:flex-none inline-flex items-center justify-center rounded-xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900 text-slate-700 dark:text-slate-200 px-4 py-2.5 text-xs font-semibold hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                    Edit Variant
                </button>
                <button (click)="delete.emit(cv.id)"
                    class="flex-1 sm:flex-none inline-flex items-center justify-center rounded-xl border border-rose-200 bg-rose-50 text-rose-700 px-4 py-2.5 text-xs font-semibold hover:bg-rose-100 transition-colors dark:border-rose-500/20 dark:bg-rose-500/10 dark:text-rose-100 dark:hover:bg-rose-500/20">
                    Delete
                </button>
            </div>
        </div>
    </div>

</div>
