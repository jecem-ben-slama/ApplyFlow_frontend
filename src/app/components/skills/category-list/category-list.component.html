<div *ngIf="categories.length > 0"
    class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm overflow-hidden transition-all duration-200">

    <div (click)="toggleCollapse()"
        class="flex items-center justify-between p-5 md:px-6 cursor-pointer select-none hover:bg-slate-50 dark:hover:bg-slate-800/40 transition-colors border-b border-slate-100 dark:border-slate-800/60">
        <div class="flex items-center gap-3">
            <span class="text-xs font-bold uppercase tracking-wider text-indigo-600 dark:text-indigo-400">
                Category Management
            </span>
        </div>
        <div class="flex items-center gap-2 text-slate-400">
            <span class="text-xs font-medium text-slate-400 hidden sm:inline">{{ isCollapsed ? 'Expand' : 'Hide'
                }}</span>
            <mat-icon class="scale-90 transition-transform duration-300 text-slate-400"
                [class.rotate-180]="isCollapsed">expand_less</mat-icon>
        </div>
    </div>

    <div *ngIf="!isCollapsed" @sectionSlide class="p-5 md:p-6 space-y-6">
        <div
            class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-slate-100 dark:border-slate-800/80 pb-6">
            <div>
                <h3 class="text-base font-bold text-slate-800 dark:text-slate-100">Registered Skills</h3>
                <p class="text-[11px] text-slate-400 dark:text-slate-500 mt-0.5">Select a category card below to filter
                    the
                    list, or manage your categories.</p>
            </div>
            <button (click)="addCategory.emit()"
                class="inline-flex self-start sm:self-center items-center justify-center gap-2 rounded-xl border border-indigo-600 bg-indigo-600 px-5 py-2.5 text-xs font-semibold text-white transition-all shadow-sm shadow-indigo-600/10 hover:bg-indigo-500 hover:border-indigo-500">
                <mat-icon class="text-base !w-4 !h-4">add</mat-icon>
                Add Category
            </button>
        </div>

        <div class="space-y-3">
            <div class="flex items-center justify-between">
                <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500">Filter /
                    Edit Categories</span>
                <button (click)="onSelectCategory(null)"
                    class="text-[10px] font-semibold text-indigo-600 hover:text-indigo-500 dark:text-indigo-400 underline underline-offset-2">
                    Clear filter (Show all)
                </button>
            </div>

            <div class="grid gap-3 grid-cols-2 sm:grid-cols-3 xl:grid-cols-4">
                <button *ngFor="let cat of categories" type="button"
                    [class]="'group inline-flex items-center justify-between gap-2 rounded-xl border px-4 py-3 text-left transition-all shadow-sm relative overflow-hidden ' + 
                    (selectedFilterCategoryId === cat.id 
                        ? 'bg-indigo-50 border-indigo-400 dark:bg-indigo-950/30 dark:border-indigo-500/40 ring-2 ring-indigo-500/20' 
                        : 'bg-slate-50/60 border-slate-200 dark:bg-slate-950/60 dark:border-slate-800 hover:border-indigo-400 hover:ring-2 hover:ring-indigo-500/10')"
                    (click)="onSelectCategory(cat.id)">

                    <span class="text-xs font-semibold text-slate-800 dark:text-slate-200 truncate flex-1 pr-8">{{
                        cat.name
                        }}</span>

                    <div
                        class="absolute right-1 top-1/2 -translate-y-1/2 flex items-center gap-0.5 bg-white/80 dark:bg-slate-900/80 px-1 py-0.5 rounded-lg border border-slate-100 dark:border-slate-800">
                        <button type="button"
                            class="inline-flex items-center justify-center rounded-lg text-slate-400 hover:text-indigo-600 transition-all p-1"
                            (click)="onEdit(cat, $event)" title="Edit Category">
                            <mat-icon class="text-xs !w-3.5 !h-3.5">edit</mat-icon>
                        </button>
                        <button type="button"
                            class="inline-flex items-center justify-center rounded-lg text-slate-400 hover:text-rose-600 transition-all p-1"
                            (click)="onDelete(cat, $event)" title="Delete Category">
                            <mat-icon class="text-xs !w-3.5 !h-3.5">delete</mat-icon>
                        </button>
                    </div>
                </button>
            </div>
        </div>
    </div>
</div>
