<div
    class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm overflow-hidden">

    <!-- FILTER BAR — always visible, no collapse, this is the primary interaction -->
    <div class="p-5 md:px-6 md:py-5 space-y-3">
        <div class="flex items-center justify-between gap-4">
            <span class="text-[10px] font-bold uppercase tracking-wider text-slate-400 dark:text-slate-500">
                Filter by Category
            </span>
        <button type="button" (click)="toggleManage()"
            class="inline-flex items-center gap-1.5 text-[11px] font-semibold text-slate-500 hover:text-indigo-600 dark:text-slate-400 dark:hover:text-indigo-400 transition-colors">
            Manage
            <mat-icon
                class="!w-3.5 !h-3.5 !flex !items-center !justify-center text-sm leading-none transition-transform duration-200"
                [class.rotate-180]="isManageOpen">expand_more</mat-icon>
        </button>
        </div>

        <div class="flex flex-wrap gap-2">
            <button type="button" (click)="onSelectCategory(null)"
                [class]="'inline-flex items-center rounded-full px-3.5 py-1.5 text-xs font-semibold transition-all border ' +
                (selectedFilterCategoryId === null
                    ? 'bg-indigo-600 border-indigo-600 text-white shadow-sm shadow-indigo-600/20'
                    : 'bg-slate-50 border-slate-200 text-slate-600 hover:border-indigo-300 hover:text-indigo-600 dark:bg-slate-950/60 dark:border-slate-800 dark:text-slate-300')">
                All
            </button>

            <button *ngFor="let cat of categories" type="button" (click)="onSelectCategory(cat.id)"
                [class]="'inline-flex items-center rounded-full px-3.5 py-1.5 text-xs font-semibold transition-all border ' +
                (selectedFilterCategoryId === cat.id
                    ? 'bg-indigo-600 border-indigo-600 text-white shadow-sm shadow-indigo-600/20'
                    : 'bg-slate-50 border-slate-200 text-slate-600 hover:border-indigo-300 hover:text-indigo-600 dark:bg-slate-950/60 dark:border-slate-800 dark:text-slate-300')">
                {{ cat.name }}
            </button>

            <button *ngIf="categories.length === 0" type="button" (click)="addCategory.emit()"
                class="inline-flex items-center gap-1.5 rounded-full px-3.5 py-1.5 text-xs font-semibold border border-dashed border-slate-300 text-slate-400 hover:border-indigo-400 hover:text-indigo-600 transition-all">
                <mat-icon class="!w-3.5 !h-3.5 text-sm">add</mat-icon>
                Add your first category
            </button>
        </div>
    </div>

    <!-- MANAGE PANEL — separate, deliberate, no accidental filter clicks -->
    <div *ngIf="isManageOpen" @sectionSlide
        class="border-t border-slate-100 dark:border-slate-800/80 bg-slate-50/50 dark:bg-slate-950/30">
        <div class="p-5 md:px-6 space-y-3">
            <div class="flex items-center justify-between">
                <h3 class="text-xs font-bold text-slate-700 dark:text-slate-200">Manage Categories</h3>
                <button type="button" (click)="addCategory.emit()"
                    class="inline-flex items-center gap-1.5 rounded-lg border border-indigo-600 bg-indigo-600 px-3 py-1.5 text-[11px] font-semibold text-white hover:bg-indigo-500 hover:border-indigo-500 transition-all">
                    <mat-icon class="!w-3.5 !h-3.5 text-sm">add</mat-icon>
                    New Category
                </button>
            </div>

            <div *ngIf="categories.length === 0" class="text-xs text-slate-400 py-3 text-center">
                No categories yet.
            </div>

            <ul *ngIf="categories.length > 0"
                class="divide-y divide-slate-100 dark:divide-slate-800/80 rounded-xl border border-slate-100 dark:border-slate-800/80 overflow-hidden bg-white dark:bg-slate-900">
                <li *ngFor="let cat of categories"
                    class="flex items-center justify-between px-4 py-2.5 hover:bg-slate-50 dark:hover:bg-slate-800/40 transition-colors">
                    <span class="text-xs font-medium text-slate-700 dark:text-slate-300 truncate">{{ cat.name }}</span>
                    <div class="flex items-center gap-1">
                        <button type="button" (click)="onEdit(cat, $event)" title="Edit category"
                            class="inline-flex items-center justify-center rounded-lg p-1.5 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 dark:hover:bg-indigo-950/40 transition-colors">
                            <mat-icon class="!w-4 !h-4 text-sm">edit</mat-icon>
                        </button>
                        <button type="button" (click)="onDelete(cat, $event)" title="Delete category"
                            class="inline-flex items-center justify-center rounded-lg p-1.5 text-slate-400 hover:text-rose-600 hover:bg-rose-50 dark:hover:bg-rose-950/40 transition-colors">
                            <mat-icon class="!w-4 !h-4 text-sm">delete</mat-icon>
                        </button>
                    </div>
                </li>
            </ul>
        </div>
    </div>
</div>
