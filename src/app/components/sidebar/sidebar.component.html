<aside
    class="w-64 h-screen border-r border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 flex flex-col justify-between p-4 sticky top-0 text-slate-700 dark:text-slate-200 transition-colors duration-200">

    <div class="space-y-8">
        <div class="flex items-center gap-2.5 px-2">
            <div
                class="w-7 h-7 rounded-lg bg-indigo-600 flex items-center justify-center font-black text-white text-base shadow-md shadow-indigo-600/20">
                A
            </div>
            <span class="text-base font-bold text-slate-900 dark:text-white tracking-wide">ApplyFlow</span>
        </div>

        <nav class="space-y-1">
            <a routerLink="/templates"
                routerLinkActive="bg-slate-100 dark:bg-slate-900 text-indigo-600 dark:text-indigo-400 font-medium border-l-2 border-indigo-500"
                [routerLinkActiveOptions]="{ exact: true }"
                class="flex items-center gap-3 px-3 py-2.5 rounded-r-lg cursor-pointer transition-all duration-150 text-xs hover:bg-slate-50 dark:hover:bg-slate-900/50 hover:text-slate-900 dark:hover:text-slate-200 decoration-none no-underline group">
                <mat-icon
                    class="scale-90 text-slate-400 dark:text-slate-500 group-[.text-indigo-600]:text-indigo-600 group-[.text-indigo-400]:text-indigo-400">dashboard</mat-icon>
                <span>Templates</span>
            </a>
<a routerLink="/cv-variants"
    routerLinkActive="bg-slate-100 dark:bg-slate-900 text-indigo-600 dark:text-indigo-400 font-medium border-l-2 border-indigo-500"
    [routerLinkActiveOptions]="{ exact: true }"
    class="flex items-center gap-3 px-3 py-2.5 rounded-r-lg cursor-pointer transition-all duration-150 text-xs hover:bg-slate-50 dark:hover:bg-slate-900/50 hover:text-slate-900 dark:hover:text-slate-200 decoration-none no-underline group">
    <mat-icon
        class="scale-90 text-slate-400 dark:text-slate-500 group-[.text-indigo-600]:text-indigo-600 group-[.text-indigo-400]:text-indigo-400">dashboard</mat-icon>
    <span>CV Variants</span>
</a>
            <a routerLink="/skills"
                routerLinkActive="bg-slate-100 dark:bg-slate-900 text-indigo-600 dark:text-indigo-400 font-medium border-l-2 border-indigo-500"
                class="flex items-center gap-3 px-3 py-2.5 rounded-r-lg cursor-pointer transition-all duration-150 text-xs hover:bg-slate-50 dark:hover:bg-slate-900/50 hover:text-slate-900 dark:hover:text-slate-200 decoration-none no-underline group">
                <mat-icon
                    class="scale-90 text-slate-400 dark:text-slate-500 group-[.text-indigo-600]:text-indigo-600 group-[.text-indigo-400]:text-indigo-400">psychology</mat-icon>
                <span>Skills Engine</span>
            </a>
        </nav>
    </div>

    <div class="space-y-4 pt-4 border-t border-slate-200 dark:border-slate-900/60">

        <button type="button" (click)="toggleTheme()"
            class="flex items-center justify-between w-full px-3 py-2 rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors group select-none text-left">
            <div class="flex items-center gap-3">
                <mat-icon
                    class="text-slate-500 dark:text-slate-400 group-hover:text-indigo-500 scale-90 transition-colors">
                    {{ (isDarkMode$ | async) ? 'light_mode' : 'dark_mode' }}
                </mat-icon>
                <div>
                    <p class="text-sm font-semibold text-slate-900 dark:text-slate-100">
                        {{ (isDarkMode$ | async) ? 'Light mode active' : 'Dark mode active' }}
                    </p>
                    <p class="text-[10px] text-slate-500 dark:text-slate-400">
                        Click to switch theme.
                    </p>
                </div>
            </div>
            <span class="relative inline-flex items-center w-12 h-6 rounded-full transition-colors"
                [class.bg-indigo-500]="isDarkMode$ | async" [class.bg-slate-300]="!(isDarkMode$ | async)">
                <span class="absolute left-0.5 top-0.5 w-5 h-5 rounded-full bg-white shadow-sm transition-transform"
                    [class.translate-x-6]="isDarkMode$ | async"></span>
            </span>
        </button>

        <div
            class="flex items-center gap-3 p-2 bg-white dark:bg-slate-900/30 border border-slate-200 dark:border-slate-800 rounded-xl">
            <div
                class="w-8 h-8 rounded-full bg-gradient-to-tr from-purple-500 to-indigo-500 flex items-center justify-center font-bold text-white text-xs">
                MY
            </div>
            <div class="flex-1 min-w-0">
                <h4 class="text-xs font-semibold text-slate-800 dark:text-slate-200 truncate leading-none mb-0.5">{{
                    userName }}</h4>
                <p
                    class="text-[10px] text-slate-400 dark:text-slate-500 font-medium tracking-wide truncate leading-none">
                    {{ userTier }}</p>
            </div>
        </div>
    </div>

</aside>
