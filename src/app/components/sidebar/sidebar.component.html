<aside
    class="w-64 h-screen border-r border-slate-900 bg-slate-950 flex flex-col justify-between p-4 sticky top-0 text-slate-400">

    <div class="space-y-8">
        <div class="flex items-center gap-2.5 px-2">
            <div
                class="w-7 h-7 rounded-lg bg-indigo-600 flex items-center justify-center font-black text-white text-base shadow-md shadow-indigo-600/20">
                A
            </div>
            <span class="text-base font-bold text-white tracking-wide">ApplyFlow</span>
        </div>

        <nav class="space-y-1">
            <div *ngFor="let item of navItems" (click)="setActive(item)" [ngClass]="{
          'bg-slate-900 text-indigo-400 font-medium border-l-2 border-indigo-500': item.active,
          'hover:bg-slate-900/50 hover:text-slate-200': !item.active
        }" class="flex items-center gap-3 px-3 py-2.5 rounded-r-lg cursor-pointer transition-all duration-150 text-xs">
                <mat-icon class="scale-90" [ngClass]="item.active ? 'text-indigo-400' : 'text-slate-500'">
                    {{ item.icon }}
                </mat-icon>
                <span>{{ item.label }}</span>
            </div>
        </nav>
    </div>

    <div class="space-y-4 pt-4 border-t border-slate-900/60">
        <div
            class="flex items-center gap-3 px-3 py-2 rounded-lg hover:bg-slate-900/50 hover:text-slate-200 cursor-pointer text-xs transition-colors">
            <mat-icon class="text-slate-500 scale-90">settings</mat-icon>
            <span>Settings</span>
        </div>

        <div class="flex items-center gap-3 p-2 bg-slate-900/30 border border-slate-900 rounded-xl">
            <div
                class="w-8 h-8 rounded-full bg-gradient-to-tr from-purple-500 to-indigo-500 flex items-center justify-center font-bold text-white text-xs">
                MY
            </div>
            <div class="flex-1 min-w-0">
                <h4 class="text-xs font-semibold text-slate-200 truncate leading-none mb-0.5">{{ userName }}</h4>
                <p class="text-[10px] text-slate-500 font-medium tracking-wide truncate leading-none">{{ userTier }}</p>
            </div>
        </div>
    </div>

</aside>
