<div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-5">
    <div class="flex flex-wrap items-center gap-2">
        <button (click)="onFilterChange('ALL')"
            [class]="!selectedLanguage ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400'"
            class="px-4 py-1.5 rounded-xl border text-xs font-semibold transition-all shadow-sm">All</button>
        <button (click)="onFilterChange('EN')"
            [class]="selectedLanguage === 'EN' ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400'"
            class="px-4 py-1.5 rounded-xl border text-xs font-semibold transition-all shadow-sm">English (EN)</button>
        <button (click)="onFilterChange('FR')"
            [class]="selectedLanguage === 'FR' ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white dark:bg-slate-950 border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400'"
            class="px-4 py-1.5 rounded-xl border text-xs font-semibold transition-all shadow-sm">French (FR)</button>

        <div class="relative w-full sm:w-auto mt-2 sm:mt-0">
            <mat-icon
                class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 scale-90 pointer-events-none">search</mat-icon>
            <input type="text" [(ngModel)]="localSearchTerm" (ngModelChange)="onSearchInput()"
                placeholder="Search templates..."
                class="pl-10 pr-4 py-2 text-xs rounded-xl bg-slate-50/80 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 text-slate-800 dark:text-slate-200 placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all w-full sm:w-56 shadow-sm" />
        </div>
    </div>
    <span class="text-xs text-slate-400 dark:text-slate-500 font-mono" *ngIf="totalElements > 0">
        Showing {{ currentCount }} of {{ totalElements }} entries
    </span>
</div>
