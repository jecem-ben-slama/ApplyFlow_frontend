<ng-container *ngIf="authService.isAuthenticated$ | async; else showLogin">
  <div class="flex flex-col md:flex-row min-h-screen bg-slate-50 dark:bg-slate-950">
    <app-sidebar></app-sidebar>
  
    <main class="flex-1 w-full pb-14 md:pb-0 overflow-y-auto">
      <router-outlet></router-outlet>
    </main>
  </div>
</ng-container>

<ng-template #showLogin>
  <router-outlet></router-outlet>
</ng-template>
